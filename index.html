<script>
  // --- Authors on the site (from your repo folders) ---
  const AUTHORS = [
    {
      name: "Lila Rose",
      url: "/LilaRose/",
      genres: ["Romance"],
      tone: ["cosy"],
      tagline: "Sweet, wholesome small-town romance with heart."
    },
    {
      name: "Penny Reid",
      url: "/penny-reid/",
      genres: ["Romance"],
      tone: ["cosy", "bold"],
      tagline: "Smart, addictive romance with fake dating, STEM heroines, and bingeable chemistry."
    },
    {
      name: "Bella Andre",
      url: "/bella-andre/",
      genres: ["Romance"],
      tone: ["cosy", "bold"],
      tagline: "Beach weddings, billionaire heroes, and contemporary romance built for binge reading."
    },
    {
      name: "LADY LEGACY",
      url: "/LadyLegacy/",
      genres: ["Urban Fiction"],
      tone: ["bold"],
      tagline: "High-stakes drama: power, betrayal, and explosive secrets."
    },
    {
      name: "Marie McKenzie",
      url: "/MarieMcKenzie/",
      genres: ["Non-fiction"],
      tone: ["practical", "cosy"],
      tagline: "Trauma-informed writing about healing, care, and being human."
    },
    {
      name: "Tory Hunt",
      url: "/ToryHunt/",
      genres: ["Non-fiction", "Self-Help"],
      tone: ["practical"],
      tagline: "Practical life-skills books to build confidence for teens and tweens."
    }
  ];

  const FEATURED = [
    "Penny Reid",
    "Bella Andre",
    "Lila Rose",
    "Marie McKenzie"
  ];

  function $(id){ return document.getElementById(id); }

  function uniq(arr){ return [...new Set(arr)]; }
  function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  function buildGenreStats(){
    const stats = {};
    AUTHORS.forEach(a => (a.genres || []).forEach(g => {
      stats[g] = (stats[g] || 0) + 1;
    }));
    return stats;
  }

  function populateGenreSelect(){
    const stats = buildGenreStats();
    const genres = Object.keys(stats).sort((a,b) => a.localeCompare(b, "en-GB"));
    const sel = $("genreSelect");

    sel.querySelectorAll("option:not([value=''])").forEach(o => o.remove());

    genres.forEach(g => {
      const opt = document.createElement("option");
      opt.value = g;
      opt.textContent = `${g} (${stats[g]})`;
      sel.appendChild(opt);
    });
  }

  function renderGenreGrid(){
    const stats = buildGenreStats();
    const genres = Object.keys(stats).sort((a,b) => a.localeCompare(b, "en-GB"));
    const grid = $("genreGrid");
    grid.innerHTML = "";

    genres.forEach(g => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "genre-card";
      btn.innerHTML = `
        <div class="genre-name">${g}</div>
        <div class="genre-meta">${stats[g]} author${stats[g] === 1 ? "" : "s"} →</div>
      `;
      btn.addEventListener("click", () => goToRandomAuthor({ genre: g }));
      grid.appendChild(btn);
    });
  }

  function renderFeatured(){
    const grid = $("featuredGrid");
    grid.innerHTML = "";

    const featuredAuthors = FEATURED
      .map(name => AUTHORS.find(a => a.name === name))
      .filter(Boolean);

    const cards = featuredAuthors.slice(0, 2);
    cards.push({
      name: "Let fate choose",
      url: null,
      tagline: "Pick a genre and we’ll send you somewhere new.",
      genres:["Any"],
      tone:[""]
    });

    cards.forEach(a => {
      const el = document.createElement(a.url ? "a" : "div");
      el.className = "author-card";
      if(a.url){
        el.href = a.url;
      }else{
        el.style.cursor = "pointer";
        el.addEventListener("click", () => goToRandomAuthor({}));
      }

      const by = a.url ? "Featured author" : "Any genre";
      const badge = a.url ? "★ Featured" : "🎲 Surprise";

      el.innerHTML = `
        <div class="cover" aria-hidden="true"></div>
        <div>
          <h3>${a.name}</h3>
          <p class="by">${by}</p>
          <p class="tagline">${a.tagline || ""}</p>
          <span class="badge">${badge}</span>
        </div>
      `;
      grid.appendChild(el);
    });
  }

  function matchesFilters(author, filters){
    const { genre, tone } = filters;

    if(genre){
      const ok = (author.genres || []).includes(genre);
      if(!ok) return false;
    }
    if(tone){
      const ok = (author.tone || []).includes(tone);
      if(!ok) return false;
    }
    return true;
  }

  function goToRandomAuthor(overrides){
    const genre = overrides.genre ?? $("genreSelect").value;
    const tone  = overrides.tone  ?? $("toneSelect").value;

    const pool = AUTHORS.filter(a => matchesFilters(a, { genre, tone }));

    if(!pool.length){
      $("matchHint").textContent = "No matches for those filters yet. Try Any genre (or add more authors).";
      return;
    }

    const chosen = pickRandom(pool);
    window.location.href = chosen.url;
  }

  function resetFilters(){
    $("genreSelect").value = "";
    $("toneSelect").value = "";
    $("matchHint").textContent = "";
  }

  $("newsletterForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = $("email").value.trim();
    if(!email) return;
    $("newsletterHint").textContent = "Cheers — you’re on the list (placeholder). Connect this to your email provider when ready.";
    try{ localStorage.setItem("abc_newsletter_email", email); }catch(_){}
    e.target.reset();
  });

  $("year").textContent = new Date().getFullYear();
  $("authorCountHint").textContent = `Currently featuring ${AUTHORS.length} author pages — more coming soon.`;
  populateGenreSelect();
  renderGenreGrid();
  renderFeatured();

  $("findBtn").addEventListener("click", () => goToRandomAuthor({}));
  $("heroSurprise").addEventListener("click", () => goToRandomAuthor({}));
  $("resetBtn").addEventListener("click", resetFilters);
</script>
