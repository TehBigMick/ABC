<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authors Book Club</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Welcome to Authors Book Club</h1>

    <!-- Random Author Section -->
    <div class="random-section">
      <h2>Surprise Me!</h2>
      <div id="random-author">Click below to discover an author</div>
      <div class="bubble-button" onclick="displayRandomAuthor()">🎲 Random Author</div>
    </div>

    <!-- Genre Filter Section -->
    <div class="genre-section">
      <h2>Browse by Genre</h2>
      <div id="genre-buttons" class="genre-list"></div>
    </div>

    <!-- Authors Display Section -->
    <div class="all-authors">
      <h2>All Authors</h2>
      <div id="author-container" class="author-list"></div>
    </div>
  </div>

  <script>
    // Full Author List
    const authors = [
      "AmyCross",
      "BorisBacic",
      "DevneyPerry",
      "JD-Kirk",
      "KMAvery",
      "LadyLegacy",
      "LilaRose",
      "MarieMcKenzie",
      "Matt-Dinniman",
      "ToryHunt",
      "TravisDeverell",
      "Zogarth",
      "bella-andre",
      "lucy-score",
      "penny-reid"
    ];

    // Genre Mapping
    const authorGenres = {
      "AmyCross": "Romance",
      "BorisBacic": "Thriller",
      "DevneyPerry": "Romance",
      "JD-Kirk": "Crime",
      "KMAvery": "Romance",
      "LadyLegacy": "Urban Fiction",
      "LilaRose": "Romance",
      "MarieMcKenzie": "Non-Fiction",
      "Matt-Dinniman": "Romance",
      "ToryHunt": "Teen Life Skills",
      "TravisDeverell": "Thriller",
      "Zogarth": "Sci-Fi",
      "bella-andre": "Romance",
      "lucy-score": "Romance",
      "penny-reid": "Romantic Comedy"
    };

    // Populate All Authors
    const authorContainer = document.getElementById("author-container");
    function displayAllAuthors(list) {
      authorContainer.innerHTML = "";
      list.forEach(author => {
        const div = document.createElement("div");
        div.className = "author-card";
        div.textContent = author;
        authorContainer.appendChild(div);
      });
    }
    displayAllAuthors(authors);

    // Random Author Function
    function displayRandomAuthor() {
      const randomIndex = Math.floor(Math.random() * authors.length);
      const randomAuthor = authors[randomIndex];
      document.getElementById("random-author").textContent = randomAuthor;
      
      // Optional: highlight the author in the list
      const cards = document.querySelectorAll(".author-card");
      cards.forEach(card => card.classList.remove("highlight"));
      cards[randomIndex].classList.add("highlight");
    }

    // Populate Genre Buttons
    const genres = [...new Set(Object.values(authorGenres))];
    const genreButtons = document.getElementById("genre-buttons");
    genres.forEach(genre => {
      const btn = document.createElement("div");
      btn.className = "genre-button";
      btn.textContent = genre;
      btn.onclick = () => {
        const filtered = authors.filter(author => authorGenres[author] === genre);
        displayAllAuthors(filtered);
      };
      genreButtons.appendChild(btn);
    });
  </script>

</body>
</html>
