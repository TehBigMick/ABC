<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authors Book Club</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1, h2 { color: #333; }
    .author-list, .genre-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .author-card, .genre-button { background: #fff; padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
    .random-section { margin: 20px 0; }
    #random-author { font-weight: bold; color: #2a7ae2; }
  </style>
</head>
<body>

  <h1>Welcome to Authors Book Club</h1>

  <!-- Random Author Section -->
  <div class="random-section">
    <h2>Surprise Me!</h2>
    <div id="random-author">Click below to discover an author</div>
    <button onclick="displayRandomAuthor()">🎲 Random Author</button>
  </div>

  <!-- Genre Filter Section -->
  <div class="genre-section">
    <h2>Browse by Genre</h2>
    <div id="genre-buttons" class="genre-list"></div>
  </div>

  <!-- Authors Display Section -->
  <div class="all-authors">
    <h2>All Authors</h2>
    <div id="author-container" class="author-list"></div>
  </div>

  <script>
    // Full Author List
    const authors = [
      "AmyCross",
      "BorisBacic",
      "DevneyPerry",
      "JD-Kirk",
      "KMAvery",
      "LadyLegacy",
      "LilaRose",
      "MarieMcKenzie",
      "Matt-Dinniman",
      "ToryHunt",
      "TravisDeverell",
      "Zogarth",
      "bella-andre",
      "lucy-score",
      "penny-reid"
    ];

    // Genre Mapping
    const authorGenres = {
      "AmyCross": "Romance",
      "BorisBacic": "Thriller",
      "DevneyPerry": "Romance",
      "JD-Kirk": "Crime",
      "KMAvery": "Romance",
      "LadyLegacy": "Urban Fiction",
      "LilaRose": "Romance",
      "MarieMcKenzie": "Non-Fiction",
      "Matt-Dinniman": "Romance",
      "ToryHunt": "Teen Life Skills",
      "TravisDeverell": "Thriller",
      "Zogarth": "Sci-Fi",
      "bella-andre": "Romance",
      "lucy-score": "Romance",
      "penny-reid": "Romantic Comedy"
    };

    // Populate All Authors
    const authorContainer = document.getElementById("author-container");
    authors.forEach(author => {
      const div = document.createElement("div");
      div.className = "author-card";
      div.textContent = author;
      authorContainer.appendChild(div);
    });

    // Random Author Function
    function displayRandomAuthor() {
      const randomIndex = Math.floor(Math.random() * authors.length);
      document.getElementById("random-author").textContent = authors[randomIndex];
    }

    // Populate Genre Buttons
    const genres = [...new Set(Object.values(authorGenres))];
    const genreButtons = document.getElementById("genre-buttons");
    genres.forEach(genre => {
      const btn = document.createElement("div");
      btn.className = "genre-button";
      btn.textContent = genre;
      btn.onclick = () => filterByGenre(genre);
      genreButtons.appendChild(btn);
    });

    // Filter Authors by Genre
    function filterByGenre(genre) {
      authorContainer.innerHTML = "";
      const filtered = authors.filter(author => authorGenres[author] === genre);
      filtered.forEach(author => {
        const div = document.createElement("div");
        div.className = "author-card";
        div.textContent = author;
        authorContainer.appendChild(div);
      });
    }
  </script>

</body>
</html>
